name: Job Agent

on:
  schedule:
    # Active hours: 7 AM – 9 PM Eastern time, year-round, DST-safe.
    #
    # Cron runs at minutes :07, :27, :47 — every 20 minutes, offset off-peak
    # to avoid GitHub Actions queue congestion at top-of-hour boundaries.
    #
    # During EDT (March–November):  7am ET = 11:00 UTC,  9pm ET = 01:00 UTC next day
    # During EST (November–March):  7am ET = 12:00 UTC,  9pm ET = 02:00 UTC next day
    # Union covers UTC 11..23 and 0..2.
    - cron: "7,27,47 11-23 * * *"
    - cron: "7,27,47 0-2 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore SQLite (so dedup persists across runs)
        uses: actions/cache@v4
        with:
          path: data/jobs.db
          key: jobs-db-${{ github.run_id }}
          restore-keys: |
            jobs-db-

      - name: Run agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_API_KEY: ${{ secrets.ADZUNA_API_KEY }}
          HUNTER_API_KEY: ${{ secrets.HUNTER_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main

      - name: Upload artifacts (tailored resumes + emails)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ github.run_id }}
          path: data/output/
          retention-days: 30
          if-no-files-found: ignore
