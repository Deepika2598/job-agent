# Job search configuration

search:
  keywords:
    - "data engineer"
    - "senior data engineer"
    - "lead data engineer"
    - "staff data engineer"
    - "analytics engineer"
    - "etl engineer"
    - "data platform engineer"

  locations:
    - "remote"
    - "United States"
    - "Texas"
    - "Dallas"
    - "Austin"
    - "Houston"

  max_age_hours: 48
  min_match_score: 60

filters:
  exclude_phrases:
    - "us citizen"
    - "u.s. citizen"
    - "citizens only"
    - "citizenship required"
    - "must be a citizen"
    - "green card holder"
    - "gc holder"
    - "no sponsorship"
    - "not able to sponsor"
    - "unable to sponsor"
    - "do not sponsor"
    - "cannot sponsor"
    - "no visa sponsorship"
    - "active security clearance"
    - "secret clearance"
    - "top secret"
    - "ts/sci"
    - "public trust clearance"
    - "polygraph"
    - "must be eligible to obtain a clearance"

  positive_phrases:
    - "visa sponsorship available"
    - "h-1b sponsorship"
    - "h1b sponsorship"
    - "sponsor work visa"
    - "willing to sponsor"
    - "we sponsor"
    - "transfer existing visa"
    - "e-verify"

  blacklist_companies: []

  priority_companies:
    - "Databricks"
    - "Snowflake"
    - "Stripe"
    - "Datadog"

sources:
  greenhouse:
    enabled: true
    boards:
      - airbnb
      - stripe
      - dropbox
      - reddit
      - asana
      - figma
      - gitlab
      - cloudflare
      - elastic
      - mongodb

  lever:
    enabled: true
    boards:
      - netflix
      - spotify
      - palantir
      - plaid

  ashby:
    enabled: true
    boards:
      - notion
      - linear
      - posthog

  remoteok:
    enabled: true

  adzuna:
    enabled: true
    country: us

tailoring:
  mode: "moderate"
  max_bullets_per_role: 7
  always_include_skills:
    - "Python"
    - "SQL"
    - "PySpark"
    - "AWS"
    - "Azure"

cold_email:
  enabled: true
  tone: "direct"
  cta: "Would you have 15 minutes this week to discuss whether my background could be a fit for the team?"

notify:
  channel: "email"
  min_notify_score: 70
  batch: true
