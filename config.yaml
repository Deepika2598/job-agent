    - "Pennsylvania"
    - "Rhode Island"
    - "South Carolina"
    - "South Dakota"
    - "Tennessee"
    - "Texas"
    - "Utah"
    - "Vermont"
    - "Virginia"
    - "Washington"
    - "West Virginia"
    - "Wisconsin"
    - "Wyoming"
    - "Atlanta"
    - "Austin"
    - "Boston"
    - "Charlotte"
    - "Chicago"
    - "Dallas"
    - "Denver"
    - "Detroit"
    - "Houston"
    - "Los Angeles"
    - "Miami"
    - "Minneapolis"
    - "Nashville"
    - "New York City"
    - "NYC"
    - "Philadelphia"
    - "Phoenix"
    - "Pittsburgh"
    - "Portland"
    - "Raleigh"
    - "San Diego"
    - "San Francisco"
    - "San Jose"
    - "Seattle"
    - "St. Louis"
    - "Tampa"
    - "Washington DC"
    - "Washington, D.C."

  max_age_hours: 48
  min_match_score: 60

filters:
  exclude_phrases:
    # citizenship / clearance
    - "us citizen"
    - "u.s. citizen"
    - "citizens only"
    - "citizenship required"
    - "must be a citizen"
    - "green card holder"
    - "gc holder"
    - "no sponsorship"
    - "not able to sponsor"
    - "unable to sponsor"
    - "do not sponsor"
    - "cannot sponsor"
    - "no visa sponsorship"
    - "active security clearance"
    - "secret clearance"
    - "top secret"
    - "ts/sci"
    - "public trust clearance"
    - "polygraph"
    - "must be eligible to obtain a clearance"
    # non-US locations
    - "remote - mexico"
    - "remote - canada"
    - "remote - india"
    - "remote - europe"
    - "remote - latam"
    - "remote - emea"
    - "remote - apac"
    - "remote - brazil"
    - "remote - argentina"
    - "remote - colombia"
    - "remote - ireland"
    - "remote - germany"
    - "remote - united kingdom"
    - "remote - uk"
    - "remote, mexico"
    - "remote, canada"
    - "remote, india"
    - "remote, europe"
    - "remote, brazil"
    - "based in mexico"
    - "based in canada"
    - "based in india"
    - "based in europe"
    - "must be located in canada"
    - "must reside in canada"
    - "must reside in mexico"
    - "must reside in india"
    - "canada only"
    - "mexico only"
    - "india only"
    - "uk only"
    - "emea only"
    - "apac only"
    - "eligible to work in canada"
    - "eligible to work in mexico"
    - "eligible to work in the uk"
    - "eligible to work in india"

  positive_phrases:
    - "visa sponsorship available"
    - "h-1b sponsorship"
    - "h1b sponsorship"
    - "sponsor work visa"
    - "willing to sponsor"
    - "we sponsor"
    - "transfer existing visa"
    - "e-verify"
    - "aws"
    - "azure"

  blacklist_companies: []

  priority_companies:
    - "Databricks"
    - "Snowflake"
    - "Stripe"
    - "Datadog"
    - "Netflix"
    - "Airbnb"
    - "Spotify"

sources:
  greenhouse:
    enabled: true
    boards:
      - airbnb
      - stripe
      - dropbox
      - reddit
      - asana
      - figma
      - gitlab
      - cloudflare
      - elastic
      - mongodb
      - twilio
      - robinhood
      - instacart
      - lyft
      - pinterest
      - squarespace
      - upwork

  lever:
    enabled: true
    boards:
      - netflix
      - spotify
      - palantir
      - plaid
      - kraken

  ashby:
    enabled: true
    boards:
      - notion
      - linear
      - posthog
      - vanta

  remoteok:
    enabled: true

  adzuna:
    enabled: true
    country: us

tailoring:
  mode: "moderate"
  max_bullets_per_role: 7
  always_include_skills:
    - "Python"
    - "SQL"
    - "PySpark"
    - "AWS"
    - "Azure"

cold_email:
  enabled: true
  tone: "direct"
  cta: "Would you have 15 minutes this week to discuss whether my background could be a fit for the team?"

notify:
  channel: "email"
  min_notify_score: 60
  batch: true
