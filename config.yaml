# Job search configuration

search:
  keywords:
    - "data engineer"
    - "senior data engineer"
    - "lead data engineer"
    - "staff data engineer"
    - "principal data engineer"
    - "analytics engineer"
    - "etl engineer"
    - "data platform engineer"
    - "data infrastructure engineer"

  # US only — onsite, hybrid, AND remote-US all welcome.
  # Filter accepts the job if its location string contains ANY of these.
  locations:
    - "United States"
    - "USA"
    - "U.S."
    - "U.S "
    - " US"
    - "US,"
    - "Remote, US"
    - "Remote - US"
    - "Remote - United States"
    - "Remote (US)"
    - "Remote US"
    - "US Remote"
    - "US-Remote"
    - "Anywhere in the US"
    - "Anywhere - US"
    - "Alabama"
    - "Alaska"
    - "Arizona"
    - "Arkansas"
    - "California"
    - "Colorado"
    - "Connecticut"
    - "Delaware"
